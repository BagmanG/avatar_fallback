name: avatar_fallback
description: >-
  A Flutter avatar widget with a reliable fallback chain: any ImageProvider down
  to deterministic, grapheme-safe initials that never fail.
version: 0.1.0
repository: https://github.com/BagmanG/avatar_fallback
homepage: https://github.com/BagmanG/avatar_fallback
issue_tracker: https://github.com/BagmanG/avatar_fallback/issues

topics:
  - avatar
  - ui
  - widget
  - image
  - profile

screenshots:
  - description: An avatar showing initials fallback on a deterministic color.
    path: doc/screenshots/initials.png
  - description: A group of overlapping avatars with a "+N" overflow indicator.
    path: doc/screenshots/group.png

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
